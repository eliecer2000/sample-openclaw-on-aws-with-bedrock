<!-- Catnip AI — Cat Mascot Icon, transparent background -->
<!-- Line-art style. viewBox 0 0 48 48. Scale to any size. -->
<!-- Apache 2.0 — Wu_JiaDe / PitchShow -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="256" height="256" fill="none"
     stroke="#e5e5e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left ear -->
  <path d="M12,20 Q10,8 16,14"/>
  <!-- Right ear -->
  <path d="M36,20 Q38,8 32,14"/>
  <!-- Head -->
  <ellipse cx="24" cy="27" rx="15" ry="13"/>
  <!-- Eyes -->
  <circle cx="18" cy="26" r="2.2" fill="#e5e5e5" stroke="none"/>
  <circle cx="30" cy="26" r="2.2" fill="#e5e5e5" stroke="none"/>
  <!-- Nose -->
  <path d="M23,30 L24,31.5 L25,30" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M22,32.5 Q24,34 26,32.5" stroke-width="1.2"/>
  <!-- Whiskers left -->
  <line x1="4"  y1="26" x2="12" y2="28" stroke-width="1" opacity="0.6"/>
  <line x1="5"  y1="30" x2="12" y2="30" stroke-width="1" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="44" y1="26" x2="36" y2="28" stroke-width="1" opacity="0.6"/>
  <line x1="43" y1="30" x2="36" y2="30" stroke-width="1" opacity="0.6"/>
</svg>
