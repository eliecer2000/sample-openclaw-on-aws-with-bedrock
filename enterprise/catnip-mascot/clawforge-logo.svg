<!-- ClawForge — Geometric Logo -->
<!-- Hexagon shield + abstract anvil/forge spark. Enterprise-grade. -->
<!-- Apache 2.0 — Wu_JiaDe / ClawForge -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="256" height="256" fill="none">
  <!-- Outer hexagon (shield shape) -->
  <path d="M24 3 L42 13.5 L42 34.5 L24 45 L6 34.5 L6 13.5 Z"
        stroke="#f97316" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Inner anvil shape (abstract) -->
  <path d="M15 30 L33 30 L30 26 L18 26 Z" fill="#f97316" opacity="0.8"/>
  <!-- Forge hammer (vertical strike) -->
  <rect x="22.5" y="14" width="3" height="11" rx="1.5" fill="#fb923c"/>
  <!-- Hammer head -->
  <rect x="19" y="12" width="10" height="4" rx="2" fill="#f97316"/>
  <!-- Spark particles -->
  <circle cx="14" cy="22" r="1.2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="11" cy="18" r="0.8" fill="#fbbf24" opacity="0.6"/>
  <circle cx="34" cy="22" r="1.2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="37" cy="18" r="0.8" fill="#fbbf24" opacity="0.6"/>
  <circle cx="16" cy="17" r="0.6" fill="#fbbf24" opacity="0.4"/>
  <circle cx="32" cy="17" r="0.6" fill="#fbbf24" opacity="0.4"/>
</svg>
